services:
  postgres:
    image: postgres:16
    container_name: jobtrackr_postgres
    environment:
      POSTGRES_DB: jobtrackr_db
      POSTGRES_USER: jobtrackr_user
      POSTGRES_PASSWORD: jobtrackr_password
    ports:
      - "5433:5432"
    volumes:
      - jobtrackr_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: jobtrackr_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@jobtrackr.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  jobtrackr_postgres_data: