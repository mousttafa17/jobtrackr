spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/jobtrackr_db}
spring.datasource.username=${DATABASE_USERNAME:jobtrackr_user}
spring.datasource.password=${DATABASE_PASSWORD:jobtrackr_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:jobtrackr-local-development-secret-change-before-production-2026}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
