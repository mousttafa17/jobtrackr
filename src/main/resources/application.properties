spring.application.name=jobtrackr

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5433/jobtrackr_db
spring.datasource.username=jobtrackr_user
spring.datasource.password=jobtrackr_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.baseline-on-migrate=true

app.jwt.secret=${JWT_SECRET:jobtrackr-local-development-secret-change-before-production-2026}
app.jwt.expiration-minutes=60

springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
