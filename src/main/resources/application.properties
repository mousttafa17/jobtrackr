spring.application.name=jobtrackr

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5433/jobtrackr_db
spring.datasource.username=jobtrackr_user
spring.datasource.password=jobtrackr_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:jobtrackr-local-development-secret-change-before-production-2026}
app.jwt.expiration-minutes=60
